<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ IA Feed</title>
<style>
/* ══════════════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════════════ */
:root {
  --bg:        #0b0b0f;
  --surface:   #131318;
  --surface2:  #1c1c24;
  --border:    #2a2a38;
  --text:      #e8eaf0;
  --text2:     #a0a8b8;
  --muted:     #5a6478;
  --accent:    #4ade80;

  --c-industria:    #f59e0b;
  --c-investigacion:#818cf8;
  --c-herramientas: #34d399;
  --c-debate:       #f472b6;
  --c-ingenieria:   #38bdf8;

  --shadow: 0 2px 12px rgba(0,0,0,.4);
  --radius: 8px;
}
[data-theme="light"] {
  --bg:       #f0f2f5;
  --surface:  #ffffff;
  --surface2: #f8f9fb;
  --border:   #dde1ea;
  --text:     #0f1117;
  --text2:    #4a5568;
  --muted:    #9aa3b2;
  --shadow:   0 2px 12px rgba(0,0,0,.08);
}

/* ══════════════════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.55;transition:background .25s,color .25s}

/* ══════════════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════════════ */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;display:flex;align-items:center;height:54px;
  position:sticky;top:0;z-index:200;gap:14px;
}
.logo{font-weight:900;font-size:18px;color:var(--accent);letter-spacing:-1px;white-space:nowrap;text-decoration:none}
.logo span{color:var(--text)}
.logo sup{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:1px}

.filters{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{background:none;border:none;color:var(--muted);padding:5px 12px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:all .15s}
.filter-btn:hover{color:var(--text);background:var(--surface2)}
.filter-btn.active{color:var(--accent);background:rgba(74,222,128,.1)}

.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.search-bar{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:20px;font-size:13px;width:160px;outline:none;transition:all .2s}
.search-bar::placeholder{color:var(--muted)}
.search-bar:focus{border-color:var(--accent);width:210px}

.timer-badge{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;background:var(--surface2);padding:4px 8px;border-radius:12px;min-width:38px;text-align:center}

.icon-btn{background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:15px}
.icon-btn:hover{color:var(--accent);border-color:var(--accent)}
.icon-btn.spinning svg{animation:spin .7s linear infinite}

/* ══════════════════════════════════════════════════════
   TICKER
══════════════════════════════════════════════════════ */
.ticker-wrap{background:var(--surface);border-bottom:1px solid var(--border);overflow:hidden;height:34px;display:flex;align-items:center}
.ticker-label{background:var(--accent);color:#000;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:0 14px;height:100%;display:flex;align-items:center;flex-shrink:0;white-space:nowrap}
.ticker-inner{overflow:hidden;flex:1;height:100%;display:flex;align-items:center}
.ticker-track{display:flex;align-items:center;animation:ticker 80s linear infinite;white-space:nowrap;will-change:transform}
.ticker-track:hover{animation-play-state:paused}
.ticker-item{font-size:12px;color:var(--text2);padding:0 32px;cursor:pointer;transition:color .15s}
.ticker-item:hover{color:var(--accent)}
.ticker-sep{color:var(--muted);font-size:10px}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ══════════════════════════════════════════════════════
   PROGRESS BAR
══════════════════════════════════════════════════════ */
.progress-bar{position:fixed;top:0;left:0;height:2px;background:var(--accent);width:0;transition:width .2s;z-index:999}

/* ══════════════════════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════════════════════ */
main{max-width:860px;margin:0 auto;padding:20px 20px 60px}

.status-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:12px;color:var(--muted)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#facc15;flex-shrink:0;transition:background .4s}
.live-dot.on{background:var(--accent);animation:pulse 2.5s ease-in-out infinite}

/* ══════════════════════════════════════════════════════
   SECTION LABEL
══════════════════════════════════════════════════════ */
.section-label{display:flex;align-items:center;gap:12px;margin:28px 0 10px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.section-label span{padding:3px 10px;border-radius:20px;font-size:10px}
.sl-hoy  span{background:rgba(74,222,128,.12);color:var(--accent)}
.sl-ayer span{background:rgba(160,168,184,.1);color:var(--text2)}
.sl-older span{background:var(--surface2);color:var(--muted)}

/* ══════════════════════════════════════════════════════
   NEWS LIST
══════════════════════════════════════════════════════ */
.news-list{display:flex;flex-direction:column}

/* ── BASE ITEM ── */
.news-item{
  padding:12px 0 12px 14px;
  border-bottom:1px solid var(--border);
  border-left:3px solid transparent;
  cursor:pointer;
  transition:background .12s;
  animation:fadeIn .25s ease both;
}
.news-item:hover{background:var(--surface);border-radius:0 var(--radius) var(--radius) 0}
.news-item.read .item-title{color:var(--muted)}

.item-title{line-height:1.3;color:var(--text);transition:color .15s}
.item-meta{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-top:5px;font-size:11.5px;color:var(--muted)}
.item-desc{color:var(--text2);line-height:1.5;margin-top:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-desc.translating{opacity:.5;font-style:italic}

.meta-source{font-weight:700;color:var(--text2)}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--muted)}
.meta-time{}
.meta-read{color:var(--muted)}

/* Category tags */
.cat-tag{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.cat-industria    {background:rgba(245,158,11,.15);color:var(--c-industria)}
.cat-investigacion{background:rgba(129,140,248,.15);color:var(--c-investigacion)}
.cat-herramientas {background:rgba(52,211,153,.15); color:var(--c-herramientas)}
.cat-debate       {background:rgba(244,114,182,.15);color:var(--c-debate)}
.cat-ingenieria   {background:rgba(56,189,248,.15); color:var(--c-ingenieria)}

/* Category left-border */
.news-item.cat-border-industria    {border-left-color:var(--c-industria)}
.news-item.cat-border-investigacion{border-left-color:var(--c-investigacion)}
.news-item.cat-border-herramientas {border-left-color:var(--c-herramientas)}
.news-item.cat-border-debate       {border-left-color:var(--c-debate)}
.news-item.cat-border-ingenieria   {border-left-color:var(--c-ingenieria)}

/* ── TIER 1: < 1 hora — titular enorme, destacado ── */
.tier-1{
  padding:18px 0 18px 16px;
  border-left-width:4px;
}
.tier-1 .item-title{font-size:1.55rem;font-weight:800;letter-spacing:-.02em}
.tier-1 .item-desc{font-size:14px;-webkit-line-clamp:3}
.tier-1 .item-hot{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:800;color:#ef4444;background:rgba(239,68,68,.12);padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;margin-right:6px;animation:hotPulse 2s ease-in-out infinite}
@keyframes hotPulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── TIER 2: 1–6 horas — titular grande ── */
.tier-2 .item-title{font-size:1.2rem;font-weight:700}
.tier-2 .item-desc{font-size:13px}

/* ── TIER 3: 6–24 horas — titular normal ── */
.tier-3 .item-title{font-size:1.0rem;font-weight:600}
.tier-3 .item-desc{display:none}

/* ── TIER 4: > 24 horas — compacto, atenuado ── */
.tier-4 .item-title{font-size:.9rem;font-weight:500;color:var(--text2)}
.tier-4 .item-desc{display:none}
.tier-4 .item-meta{font-size:11px}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text)}

/* ── SKELETON ── */
.skel{border-radius:4px;background:var(--surface2);animation:shimmer 1.6s ease-in-out infinite;display:block}
.skel-title-lg{height:32px;width:85%;margin-bottom:8px}
.skel-title-md{height:22px;width:75%;margin-bottom:6px}
.skel-title-sm{height:16px;width:65%;margin-bottom:4px}
.skel-meta{height:12px;width:40%}
.skel-item{padding:18px 0 18px 16px;border-bottom:1px solid var(--border)}

/* ── LOAD MORE ── */
.load-more-wrap{display:flex;justify-content:center;margin-top:16px}
.load-more-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:10px 28px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.load-more-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── FOOTER ── */
footer{text-align:center;padding:32px 16px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:16px}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--accent)}

/* ══════════════════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════════════════ */
@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shimmer{0%,100%{opacity:.4}50%{opacity:.7}}
@keyframes fadeIn {from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════════════ */
@media(max-width:600px){
  .tier-1 .item-title{font-size:1.25rem}
  .tier-2 .item-title{font-size:1.05rem}
  .filters{max-width:200px}
  .search-bar{width:110px}
  header{padding:0 14px;gap:8px}
}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<!-- ═══ HEADER ═══════════════════════════════════════════════ -->
<header>
  <a class="logo" href="#">⚡<span>IA</span>Feed <sup>BETA</sup></a>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">Todo</button>
    <button class="filter-btn" data-filter="industria">Industria</button>
    <button class="filter-btn" data-filter="investigacion">Investigación</button>
    <button class="filter-btn" data-filter="herramientas">Herramientas</button>
    <button class="filter-btn" data-filter="debate">Debate</button>
    <button class="filter-btn" data-filter="ingenieria">Ing. Civil</button>
  </div>

  <div class="hdr-right">
    <input class="search-bar" type="text" placeholder="🔍 Buscar…" id="searchInput" autocomplete="off">
    <span class="timer-badge" id="timerDisplay">5:00</span>
    <button class="icon-btn" id="refreshBtn" onclick="manualRefresh()" title="Actualizar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Cambiar tema">🌓</button>
  </div>
</header>

<!-- ═══ TICKER ════════════════════════════════════════════════ -->
<div class="ticker-wrap">
  <div class="ticker-label">🔴 En vivo</div>
  <div class="ticker-inner">
    <div class="ticker-track" id="tickerTrack">
      <span class="ticker-item" style="color:var(--muted);font-style:italic">Cargando últimas noticias…</span>
    </div>
  </div>
</div>

<!-- ═══ MAIN ══════════════════════════════════════════════════ -->
<main>
  <div class="status-bar">
    <div class="live-dot" id="liveDot"></div>
    <span id="statusText">Cargando fuentes…</span>
  </div>

  <div id="feedRoot"></div>
</main>

<footer>
  ⚡ IA Feed · Auto-actualización cada 5 min ·
  <a href="#" onclick="clearRead();return false">Marcar todo como no leído</a>
</footer>

<!-- ═══ SCRIPT ════════════════════════════════════════════════ -->
<script>
/* ── CONFIG ─────────────────────────────────────── */
const REFRESH_SECS   = 5 * 60;
const ITEMS_PER_FEED = 10;
const PROXY = 'https://api.rss2json.com/v1/api.json?count=' + ITEMS_PER_FEED + '&rss_url=';
const PAGE_SIZE = 20;

const CAT_LABEL = {
  industria:'Industria', investigacion:'Investigación',
  herramientas:'Herramientas', debate:'Debate', ingenieria:'Ing. Civil'
};

const FEEDS = [
  /* ─ Industria ─ */
  {url:'https://techcrunch.com/category/artificial-intelligence/feed/', name:'TechCrunch',    cat:'industria'},
  {url:'https://venturebeat.com/ai/feed/',                              name:'VentureBeat',   cat:'industria'},
  {url:'https://www.theverge.com/rss/ai-artificial-intelligence/index.xml', name:'The Verge', cat:'industria'},
  {url:'https://www.artificialintelligence-news.com/feed/',             name:'AI News',       cat:'industria'},
  {url:'https://www.anthropic.com/rss.xml',                             name:'Anthropic',     cat:'industria'},
  /* ─ Investigación ─ */
  {url:'https://huggingface.co/blog/feed.xml',                          name:'HuggingFace',   cat:'investigacion'},
  {url:'https://bair.berkeley.edu/blog/feed.xml',                       name:'BAIR Blog',     cat:'investigacion'},
  {url:'https://openai.com/blog/rss/',                                  name:'OpenAI Blog',   cat:'investigacion'},
  {url:'https://blog.google/technology/ai/rss/',                        name:'Google AI',     cat:'investigacion'},
  /* ─ Herramientas ─ */
  {url:'https://simonwillison.net/atom/entries/',                        name:'Simon Willison',cat:'herramientas'},
  {url:'https://www.deeplearning.ai/the-batch/feed/',                   name:'The Batch',     cat:'herramientas'},
  {url:'https://buttondown.com/ainews/rss',                             name:'AI News Daily', cat:'herramientas'},
  /* ─ Debate ─ */
  {url:'https://www.technologyreview.com/feed/',                        name:'MIT Tech Review',cat:'debate'},
  {url:'https://www.wired.com/feed/tag/artificial-intelligence/rss',   name:'Wired AI',      cat:'debate'},
  {url:'https://spectrum.ieee.org/feeds/blog/tech-talk.rss',            name:'IEEE Spectrum', cat:'debate'},
  /* ─ Ingeniería Civil ─ */
  {url:'https://www.enr.com/rss/news',                                  name:'ENR',           cat:'ingenieria'},
  {url:'https://www.newcivilengineer.com/feed/',                        name:'New Civil Eng.',cat:'ingenieria'},
  {url:'https://aecmag.com/feed/',                                      name:'AEC Magazine',  cat:'ingenieria'},
  {url:'https://www.geoengineer.org/news/feed',                         name:'Geoengineer',   cat:'ingenieria'},
  {url:'https://www.structuremag.org/?feed=rss2',                       name:'Structure Mag.',cat:'ingenieria'},
];

/* ── TRANSLATION CACHE ──────────────────────────── */
let transCache = {};
try { transCache = JSON.parse(localStorage.getItem('iaFeed_trans')||'{}'); } catch(e){}
const transQueue = [];
let translating = false;

async function translateText(text) {
  if (!text || text.length < 15) return text;
  if (transCache[text]) return transCache[text];
  return new Promise(resolve => {
    transQueue.push({text, resolve});
    if (!translating) processTransQueue();
  });
}

async function processTransQueue() {
  if (!transQueue.length) { translating = false; return; }
  translating = true;
  const {text, resolve} = transQueue.shift();
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=es&dt=t&q=${encodeURIComponent(text.slice(0,200))}`;
    const r = await fetch(url);
    const d = await r.json();
    const result = d[0].map(x=>x[0]).join('');
    transCache[text] = result;
    if (Object.keys(transCache).length % 20 === 0) {
      try { localStorage.setItem('iaFeed_trans', JSON.stringify(transCache)); } catch(e){}
    }
    resolve(result);
  } catch(e) { resolve(text); }
  await new Promise(r => setTimeout(r, 150));
  processTransQueue();
}

/* ── STATE ──────────────────────────────────────── */
let allItems = [], activeFilter = 'all', searchQuery = '', timerSecs = REFRESH_SECS;
let timerInterval = null, isLoading = false, visibleCount = PAGE_SIZE;
let readSet = new Set();
try { readSet = new Set(JSON.parse(localStorage.getItem('iaFeed_read')||'[]')); } catch(e){}
let theme = localStorage.getItem('iaFeed_theme') || 'dark';
document.documentElement.setAttribute('data-theme', theme);

/* ── FETCH ──────────────────────────────────────── */
async function fetchFeed(feed) {
  try {
    const r = await fetch(PROXY + encodeURIComponent(feed.url));
    const d = await r.json();
    if (d.status === 'ok' && Array.isArray(d.items)) {
      return d.items.map(item => ({
        id:      item.link || item.guid,
        title:   clean(item.title || 'Sin título'),
        desc:    extractDesc(item.description || item.summary || ''),
        link:    item.link,
        source:  feed.name,
        cat:     feed.cat,
        pubDate: new Date(item.pubDate || item.published || Date.now()),
        readMin: readMin(item.description || ''),
      }));
    }
  } catch(e){}
  return [];
}

function extractDesc(html) {
  return clean(
    html.replace(/<style[\s\S]*?<\/style>/gi,'')
        .replace(/<script[\s\S]*?<\/script>/gi,'')
        .replace(/<[^>]+>/g,' ')
        .replace(/\s+/g,' ')
  ).slice(0, 280);
}
function readMin(html) {
  return Math.max(1, Math.round(extractDesc(html).split(/\s+/).length / 40));
}
function clean(s) {
  return s.replace(/<[^>]*>/g,'')
          .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
          .replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ')
          .replace(/&#\d+;/g,'').replace(/&[a-z]+;/g,' ').trim();
}

/* ── LOAD ───────────────────────────────────────── */
async function loadAllFeeds() {
  if (isLoading) return;
  isLoading = true;
  showSkeleton();
  setStatus('Actualizando fuentes…', false);

  const bar = document.getElementById('progressBar');
  let p = 0;
  const t = setInterval(() => { p = Math.min(p+1.5, 88); bar.style.width = p+'%'; }, 80);

  const results = await Promise.allSettled(FEEDS.map(f => fetchFeed(f)));
  let items = [];
  results.forEach(r => r.status==='fulfilled' && items.push(...r.value));

  const seen = new Set();
  items = items.filter(it => {
    if (!it.id || seen.has(it.id)) return false;
    seen.add(it.id); return true;
  });
  items.sort((a,b) => b.pubDate - a.pubDate);
  allItems = items;

  clearInterval(t);
  bar.style.width = '100%';
  setTimeout(() => { bar.style.width='0'; bar.style.transition='none'; setTimeout(()=>bar.style.transition='',50); }, 400);

  visibleCount = PAGE_SIZE;
  render();
  renderTicker();
  setStatus(`${items.length} artículos · actualizado ${fmtTime(new Date())}`, true);
  isLoading = false;
  resetTimer();
}

/* ── TIER ───────────────────────────────────────── */
function getTier(pubDate) {
  const mins = (Date.now() - pubDate.getTime()) / 60000;
  if (mins < 60)   return 1;  // < 1 hora
  if (mins < 360)  return 2;  // 1–6 horas
  if (mins < 1440) return 3;  // 6–24 horas
  return 4;                   // > 1 día
}

/* ── RENDER ─────────────────────────────────────── */
function render() {
  const root = document.getElementById('feedRoot');

  let filtered = allItems;
  if (activeFilter !== 'all') filtered = filtered.filter(it => it.cat === activeFilter);
  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(it =>
      it.title.toLowerCase().includes(q) ||
      it.source.toLowerCase().includes(q) ||
      it.desc.toLowerCase().includes(q)
    );
  }

  if (!filtered.length) {
    root.innerHTML = '<div class="empty-state"><h3>Sin resultados</h3><p>Prueba con otro filtro o término de búsqueda.</p></div>';
    return;
  }

  const today     = dayStart(new Date());
  const yesterday = dayStart(new Date(+today - 86400000));

  // Group by day
  const sections = [];
  let curLabel = null;
  for (const it of filtered) {
    const day   = dayStart(it.pubDate);
    const label = day >= today ? 'Hoy' : day >= yesterday ? 'Ayer'
      : it.pubDate.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});
    if (label !== curLabel) { sections.push({label, items:[]}); curLabel = label; }
    sections[sections.length-1].items.push(it);
  }

  let totalRendered = 0;
  let html = '';

  for (const sec of sections) {
    if (totalRendered >= visibleCount) break;
    const slCls = sec.label==='Hoy' ? 'sl-hoy' : sec.label==='Ayer' ? 'sl-ayer' : 'sl-older';
    html += `<div class="section-label ${slCls}"><span>${sec.label}</span></div>`;
    html += `<div class="news-list">`;

    for (const it of sec.items) {
      if (totalRendered >= visibleCount) break;
      const tier    = getTier(it.pubDate);
      const isRead  = readSet.has(it.id);
      const catTag  = `<span class="cat-tag cat-${it.cat}">${CAT_LABEL[it.cat]||it.cat}</span>`;
      const hotBadge = tier === 1 ? `<span class="item-hot">🔥 Nuevo</span>` : '';

      const showDesc = tier <= 2 && it.desc;
      const descId   = `desc-${totalRendered}`;

      html += `
      <div class="news-item tier-${tier} cat-border-${it.cat}${isRead?' read':''}"
           data-id="${esc(it.id)}" onclick="openArticle('${esc(it.id)}','${esc(it.link)}')">
        <div class="item-title">${hotBadge}${esc(it.title)}</div>
        ${showDesc ? `<div class="item-desc translating" id="${descId}" data-orig="${esc(it.desc)}">${esc(it.desc)}</div>` : ''}
        <div class="item-meta">
          ${catTag}
          <span class="meta-dot"></span>
          <span class="meta-source">${esc(it.source)}</span>
          <span class="meta-dot"></span>
          <span class="meta-time">${timeAgo(it.pubDate)}</span>
          <span class="meta-dot"></span>
          <span class="meta-read">⏱ ${it.readMin} min</span>
        </div>
      </div>`;
      totalRendered++;
    }
    html += `</div>`;
  }

  if (totalRendered < filtered.length) {
    html += `<div class="load-more-wrap"><button class="load-more-btn" onclick="loadMore()">Cargar más noticias (${filtered.length - totalRendered} restantes)</button></div>`;
  }

  root.innerHTML = html;

  // Translate visible descriptions async
  document.querySelectorAll('.item-desc.translating').forEach(el => {
    const orig = el.dataset.orig;
    translateText(orig).then(translated => {
      if (translated && translated !== orig) {
        el.textContent = translated;
      }
      el.classList.remove('translating');
    });
  });
}

function loadMore() {
  visibleCount += PAGE_SIZE;
  render();
}

/* ── TICKER ─────────────────────────────────────── */
function renderTicker() {
  const track   = document.getElementById('tickerTrack');
  const latest  = allItems.slice(0, 20);
  if (!latest.length) return;
  const html = [...latest, ...latest].map(it =>
    `<span class="ticker-item" onclick="window.open('${esc(it.link)}','_blank')">${esc(it.title)}</span><span class="ticker-sep">◆</span>`
  ).join('');
  track.innerHTML = html;
  const len = latest.reduce((a,b) => a + b.title.length, 0);
  track.style.animationDuration = Math.max(60, len * 0.18) + 's';
}

/* ── SKELETON ───────────────────────────────────── */
function showSkeleton() {
  document.getElementById('feedRoot').innerHTML = `
    <div class="section-label sl-hoy"><span>Cargando…</span></div>
    <div class="news-list">
      ${[32,28,22,18,18,16,16,14].map(w => `
      <div class="skel-item">
        <div class="skel skel-title-${w>24?'lg':w>17?'md':'sm'}" style="width:${w*3}%"></div>
        <div class="skel skel-meta" style="width:30%;margin-top:8px"></div>
      </div>`).join('')}
    </div>`;
}

/* ── INTERACTIONS ───────────────────────────────── */
function openArticle(id, url) {
  readSet.add(id);
  try { localStorage.setItem('iaFeed_read', JSON.stringify([...readSet])); } catch(e){}
  document.querySelector(`[data-id="${esc(id)}"]`)?.classList.add('read');
  window.open(url, '_blank', 'noopener,noreferrer');
}
function clearRead() {
  readSet.clear();
  try { localStorage.removeItem('iaFeed_read'); } catch(e){}
  document.querySelectorAll('.news-item.read').forEach(el => el.classList.remove('read'));
}
function manualRefresh() {
  document.getElementById('refreshBtn').classList.add('spinning');
  loadAllFeeds().finally(() => document.getElementById('refreshBtn').classList.remove('spinning'));
}
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  try { localStorage.setItem('iaFeed_theme', theme); } catch(e){}
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  visibleCount = PAGE_SIZE;
  render();
});
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  visibleCount = PAGE_SIZE;
  render();
});

/* ── TIMER ──────────────────────────────────────── */
function resetTimer() { timerSecs = REFRESH_SECS; updateTimer(); }
function updateTimer() {
  const m = Math.floor(timerSecs/60), s = timerSecs%60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSecs--; updateTimer();
    if (timerSecs <= 0) loadAllFeeds();
  }, 1000);
}

/* ── STATUS ─────────────────────────────────────── */
function setStatus(t, live) {
  document.getElementById('statusText').textContent = t;
  document.getElementById('liveDot').className = 'live-dot' + (live ? ' on' : '');
}

/* ── HELPERS ────────────────────────────────────── */
function dayStart(d) { const c=new Date(d); c.setHours(0,0,0,0); return c; }
function timeAgo(date) {
  const diff=Date.now()-date.getTime(), m=Math.floor(diff/60000), h=Math.floor(diff/3600000), d=Math.floor(diff/86400000);
  if(m<1) return 'ahora'; if(m<60) return `hace ${m}m`; if(h<24) return `hace ${h}h`;
  if(d===1) return 'ayer'; return `hace ${d}d`;
}
function fmtTime(d) { return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); }
function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── INIT ───────────────────────────────────────── */
loadAllFeeds();
startTimer();
</script>
</body>
</html>
