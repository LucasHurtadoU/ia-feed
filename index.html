<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ IA Feed</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --border: #252525;
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #4ade80;
            --danger: #f87171;
            --cat-industria: #f59e0b;
            --cat-investigacion: #818cf8;
            --cat-herramientas: #34d399;
            --cat-debate: #f472b6;
            --cat-ingenieria: #fb923c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        /* ── HEADER ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            display: flex;
            align-items: center;
            height: 50px;
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 12px;
        }

        .logo {
            font-weight: 800;
            font-size: 16px;
            color: var(--accent);
            letter-spacing: -0.5px;
            white-space: nowrap;
        }
        .logo span { color: var(--text); }

        .filters {
            display: flex;
            gap: 2px;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }

        .filter-btn {
            background: none;
            border: none;
            color: var(--muted);
            padding: 5px 11px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .filter-btn:hover { color: var(--text); background: var(--border); }
        .filter-btn.active { color: var(--accent); background: rgba(74,222,128,0.1); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .refresh-timer {
            font-size: 12px;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            min-width: 32px;
            text-align: right;
        }

        .search-bar {
            background: var(--border);
            border: 1px solid transparent;
            color: var(--text);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            width: 160px;
            outline: none;
            transition: all 0.2s;
        }
        .search-bar::placeholder { color: var(--muted); }
        .search-bar:focus {
            border-color: var(--accent);
            background: var(--surface);
            width: 200px;
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
        }
        .refresh-btn:hover { color: var(--accent); border-color: var(--accent); }
        .refresh-btn svg { transition: transform 0.3s; }
        .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

        /* ── PROGRESS BAR ── */
        .progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 2px;
            background: var(--accent);
            width: 0;
            transition: width 0.2s ease;
            z-index: 999;
        }

        /* ── MAIN ── */
        main {
            max-width: 860px;
            margin: 0 auto;
            padding: 16px 20px 40px;
        }

        /* ── STATUS BAR ── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            font-size: 12px;
            color: var(--muted);
        }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #facc15;
            flex-shrink: 0;
            transition: background 0.4s;
        }
        .status-dot.live { background: var(--accent); animation: pulse 2.5s ease-in-out infinite; }

        /* ── SECTION DIVIDER ── */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
        }
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── FEED ITEM ── */
        .feed-list { display: flex; flex-direction: column; }

        .feed-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 9px 10px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: background 0.1s, border-color 0.1s;
            animation: fadeIn 0.25s ease both;
        }
        .feed-item:hover {
            background: var(--surface);
            border-color: var(--border);
        }
        .feed-item.read .item-title { color: var(--muted); }

        .item-rank {
            font-size: 11px;
            color: var(--muted);
            min-width: 22px;
            text-align: right;
            padding-top: 2px;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }

        .item-body { flex: 1; min-width: 0; }

        .item-title {
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            display: block;
            margin-bottom: 4px;
            word-break: break-word;
        }
        .item-title:hover { color: var(--accent); }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
        }

        .item-source { font-size: 12px; color: var(--muted); font-weight: 600; }
        .item-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
        .item-time { font-size: 12px; color: var(--muted); }

        .item-tag {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .tag-industria    { background: rgba(245,158,11,0.12); color: var(--cat-industria); }
        .tag-investigacion{ background: rgba(129,140,248,0.12); color: var(--cat-investigacion); }
        .tag-herramientas { background: rgba(52,211,153,0.12); color: var(--cat-herramientas); }
        .tag-debate       { background: rgba(244,114,182,0.12); color: var(--cat-debate); }
        .tag-ingenieria   { background: rgba(251,146,60,0.12); color: var(--cat-ingenieria); }

        /* ── SKELETON ── */
        .skeleton-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 9px 10px;
        }
        .skel {
            border-radius: 4px;
            background: var(--surface);
            animation: shimmer 1.6s ease-in-out infinite;
        }
        .skel-rank { width: 18px; height: 12px; margin-top: 3px; flex-shrink: 0; }
        .skel-body { flex: 1; }
        .skel-title { height: 15px; margin-bottom: 8px; }
        .skel-meta  { height: 11px; width: 45%; }

        /* ── EMPTY / ERROR ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty-state h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }

        .error-banner {
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.2);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 12px;
            color: var(--danger);
            margin-bottom: 12px;
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 28px 16px;
            font-size: 12px;
            color: var(--muted);
            border-top: 1px solid var(--border);
            margin-top: 24px;
        }
        footer a { color: var(--muted); text-decoration: none; }
        footer a:hover { color: var(--accent); }

        /* ── ANIMATIONS ── */
        @keyframes spin    { to { transform: rotate(360deg); } }
        @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.3} }
        @keyframes shimmer { 0%,100%{opacity:0.4} 50%{opacity:0.7} }
        @keyframes fadeIn  { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .filters { max-width: 200px; }
            .search-bar { width: 110px; }
            .search-bar:focus { width: 140px; }
            .refresh-btn span { display: none; }
        }
    </style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<header>
    <div class="logo">⚡ <span>IA</span>Feed</div>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Todo</button>
        <button class="filter-btn" data-filter="industria">Industria</button>
        <button class="filter-btn" data-filter="investigacion">Investigación</button>
        <button class="filter-btn" data-filter="herramientas">Herramientas</button>
        <button class="filter-btn" data-filter="debate">Debate</button>
        <button class="filter-btn" data-filter="ingenieria">Ingeniería+IA</button>
    </div>

    <div class="header-right">
        <input class="search-bar" type="text" placeholder="🔍  Buscar…" id="searchInput" autocomplete="off">
        <span class="refresh-timer" id="timerDisplay">5:00</span>
        <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
            <svg id="refreshIcon" width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            <span>Actualizar</span>
        </button>
    </div>
</header>

<main>
    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Cargando fuentes de noticias…</span>
    </div>
    <div id="errorContainer"></div>
    <div class="feed-list" id="feedContainer"></div>
</main>

<footer>
    ⚡ IA Feed · Auto-actualización cada 5 min ·
    <a href="#" onclick="clearReadItems(); return false;">Marcar todo como no leído</a>
</footer>

<script>
// ================================================================
//  CONFIG
// ================================================================
const REFRESH_SECS = 5 * 60;       // 5 minutes
const ITEMS_PER_FEED = 10;
const PROXY = 'https://api.rss2json.com/v1/api.json?count=' + ITEMS_PER_FEED + '&rss_url=';

const FEEDS = [
    // ── INDUSTRIA ──────────────────────────────────────────────
    { url: 'https://techcrunch.com/category/artificial-intelligence/feed/',             name: 'TechCrunch',      cat: 'industria' },
    { url: 'https://venturebeat.com/ai/feed/',                                          name: 'VentureBeat',     cat: 'industria' },
    { url: 'https://www.theverge.com/rss/ai-artificial-intelligence/index.xml',         name: 'The Verge',       cat: 'industria' },
    { url: 'https://www.artificialintelligence-news.com/feed/',                         name: 'AI News',         cat: 'industria' },
    { url: 'https://www.anthropic.com/rss.xml',                                         name: 'Anthropic',       cat: 'industria' },

    // ── INVESTIGACIÓN ──────────────────────────────────────────
    { url: 'https://huggingface.co/blog/feed.xml',                                      name: 'HuggingFace',     cat: 'investigacion' },
    { url: 'https://bair.berkeley.edu/blog/feed.xml',                                   name: 'BAIR Blog',       cat: 'investigacion' },
    { url: 'https://openai.com/blog/rss/',                                              name: 'OpenAI Blog',     cat: 'investigacion' },
    { url: 'https://blog.google/technology/ai/rss/',                                    name: 'Google AI',       cat: 'investigacion' },

    // ── HERRAMIENTAS ───────────────────────────────────────────
    { url: 'https://simonwillison.net/atom/entries/',                                   name: 'Simon Willison',  cat: 'herramientas' },
    { url: 'https://www.deeplearning.ai/the-batch/feed/',                               name: 'The Batch',       cat: 'herramientas' },
    { url: 'https://buttondown.com/ainews/rss',                                         name: 'AI News Daily',   cat: 'herramientas' },

    // ── DEBATE & OPINIÓN ──────────────────────────────────────
    { url: 'https://www.technologyreview.com/feed/',                                    name: 'MIT Tech Review', cat: 'debate' },
    { url: 'https://www.wired.com/feed/tag/artificial-intelligence/rss',                name: 'Wired AI',        cat: 'debate' },
    { url: 'https://spectrum.ieee.org/feeds/blog/tech-talk.rss',                        name: 'IEEE Spectrum',   cat: 'debate' },

    // ── INGENIERÍA + IA ───────────────────────────────────────
    { url: 'https://aecmag.com/feed/',                                                  name: 'AEC Magazine',    cat: 'ingenieria' },
    { url: 'https://constructionblog.autodesk.com/feed/',                               name: 'Autodesk Const.', cat: 'ingenieria' },
    { url: 'https://www.enr.com/rss/technology',                                        name: 'ENR Technology',  cat: 'ingenieria' },
];

// ================================================================
//  STATE
// ================================================================
let allItems      = [];
let activeFilter  = 'all';
let searchQuery   = '';
let timerSecs     = REFRESH_SECS;
let timerInterval = null;
let isLoading     = false;

// Read-state persisted in localStorage
let readSet = new Set();
try { readSet = new Set(JSON.parse(localStorage.getItem('iaFeed_read') || '[]')); } catch(e){}

const CAT_LABELS = {
    industria:    'Industria',
    investigacion:'Investigación',
    herramientas: 'Herramientas',
    debate:       'Debate',
    ingenieria:   'Ingeniería+IA',
};

// ================================================================
//  FETCH
// ================================================================
async function fetchFeed(feed) {
    const url = PROXY + encodeURIComponent(feed.url);
    try {
        const res  = await fetch(url);
        const data = await res.json();
        if (data.status === 'ok' && Array.isArray(data.items)) {
            return data.items.map(item => ({
                id:      item.link || item.guid,
                title:   cleanText(item.title || 'Sin título'),
                link:    item.link,
                source:  feed.name,
                cat:     feed.cat,
                pubDate: new Date(item.pubDate || item.published || Date.now()),
            }));
        }
    } catch (e) { /* silently skip */ }
    return [];
}

function cleanText(s) {
    return s
        .replace(/<[^>]*>/g, '')
        .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
        .replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ')
        .trim();
}

// ================================================================
//  LOAD ALL
// ================================================================
async function loadAllFeeds() {
    if (isLoading) return;
    isLoading = true;

    showSkeleton();
    setStatus('Actualizando fuentes…', false);

    // Animate progress bar
    const bar = document.getElementById('progressBar');
    let prog = 0;
    const tick = setInterval(() => { prog = Math.min(prog + 1.5, 88); bar.style.width = prog + '%'; }, 80);

    const results = await Promise.allSettled(FEEDS.map(f => fetchFeed(f)));

    let items = [];
    let failed = [];
    results.forEach((r, i) => {
        if (r.status === 'fulfilled') items.push(...r.value);
        else failed.push(FEEDS[i].name);
    });

    // Deduplicate
    const seen = new Set();
    items = items.filter(it => {
        if (!it.id || seen.has(it.id)) return false;
        seen.add(it.id); return true;
    });

    // Sort newest first
    items.sort((a, b) => b.pubDate - a.pubDate);

    allItems = items;

    clearInterval(tick);
    bar.style.width = '100%';
    setTimeout(() => { bar.style.width = '0'; bar.style.transition = 'none'; setTimeout(()=>bar.style.transition='',50); }, 400);

    render();
    setStatus(`${items.length} artículos · actualizado a las ${fmtTime(new Date())}`, true);

    if (failed.length) {
        document.getElementById('errorContainer').innerHTML =
            `<div class="error-banner">⚠️ No se cargaron: ${esc(failed.join(', '))} — se reintentará en el próximo ciclo.</div>`;
    } else {
        document.getElementById('errorContainer').innerHTML = '';
    }

    isLoading = false;
    resetTimer();
}

// ================================================================
//  RENDER
// ================================================================
function render() {
    const container = document.getElementById('feedContainer');

    let filtered = allItems;
    if (activeFilter !== 'all') filtered = filtered.filter(it => it.cat === activeFilter);
    if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(it =>
            it.title.toLowerCase().includes(q) || it.source.toLowerCase().includes(q)
        );
    }

    if (!filtered.length) {
        container.innerHTML = `
            <div class="empty-state">
                <h3>Sin resultados</h3>
                <p>Prueba con otro filtro o término de búsqueda.</p>
            </div>`;
        return;
    }

    const today = startOfDay(new Date());
    const yesterday = startOfDay(new Date(today - 86400000));

    let html = '';
    let lastSection = null;
    let rank = 1;

    for (const it of filtered) {
        const day = startOfDay(it.pubDate);
        let section;
        if (day >= today)      section = 'Hoy';
        else if (day >= yesterday) section = 'Ayer';
        else section = it.pubDate.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });

        if (section !== lastSection) {
            if (lastSection !== null) rank = 1;
            html += `<div class="section-divider">${section}</div>`;
            lastSection = section;
        }

        const isRead = readSet.has(it.id);
        const timeAgo = getTimeAgo(it.pubDate);

        html += `
            <div class="feed-item${isRead?' read':''}" data-id="${esc(it.id)}">
                <div class="item-rank">${rank++}</div>
                <div class="item-body">
                    <a class="item-title"
                       href="${esc(it.link)}"
                       target="_blank" rel="noopener noreferrer"
                       onclick="markRead('${esc(it.id)}',this)">
                        ${esc(it.title)}
                    </a>
                    <div class="item-meta">
                        <span class="item-source">${esc(it.source)}</span>
                        <div class="item-dot"></div>
                        <span class="item-time">${timeAgo}</span>
                        <div class="item-dot"></div>
                        <span class="item-tag tag-${it.cat}">${CAT_LABELS[it.cat]||it.cat}</span>
                    </div>
                </div>
            </div>`;
    }

    container.innerHTML = html;
}

// ================================================================
//  INTERACTIONS
// ================================================================
function markRead(id, el) {
    readSet.add(id);
    try { localStorage.setItem('iaFeed_read', JSON.stringify([...readSet])); } catch(e){}
    const row = document.querySelector(`.feed-item[data-id="${esc(id)}"]`);
    if (row) row.classList.add('read');
}

function clearReadItems() {
    readSet.clear();
    try { localStorage.removeItem('iaFeed_read'); } catch(e){}
    document.querySelectorAll('.feed-item.read').forEach(el => el.classList.remove('read'));
}

function manualRefresh() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    loadAllFeeds().finally(() => btn.classList.remove('spinning'));
}

// ================================================================
//  FILTER + SEARCH
// ================================================================
document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
});

document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
});

// ================================================================
//  SKELETON LOADING
// ================================================================
function showSkeleton() {
    let html = '';
    const widths = [72,85,60,78,90,65,80,70,88,76,68,82];
    widths.forEach(w => {
        html += `
            <div class="skeleton-item">
                <div class="skel skel-rank"></div>
                <div class="skel-body">
                    <div class="skel skel-title" style="width:${w}%"></div>
                    <div class="skel skel-meta"></div>
                </div>
            </div>`;
    });
    document.getElementById('feedContainer').innerHTML = html;
}

// ================================================================
//  TIMER
// ================================================================
function resetTimer() {
    timerSecs = REFRESH_SECS;
    updateTimerDisplay();
}
function updateTimerDisplay() {
    const m = Math.floor(timerSecs / 60);
    const s = timerSecs % 60;
    document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}
function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timerSecs--;
        updateTimerDisplay();
        if (timerSecs <= 0) loadAllFeeds();
    }, 1000);
}

// ================================================================
//  STATUS
// ================================================================
function setStatus(text, live) {
    document.getElementById('statusText').textContent = text;
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (live ? ' live' : '');
}

// ================================================================
//  HELPERS
// ================================================================
function startOfDay(d) {
    const c = new Date(d);
    c.setHours(0,0,0,0);
    return c;
}

function getTimeAgo(date) {
    const diff = Date.now() - date.getTime();
    const m = Math.floor(diff / 60000);
    const h = Math.floor(diff / 3600000);
    const d = Math.floor(diff / 86400000);
    if (m < 1)  return 'ahora mismo';
    if (m < 60) return `hace ${m} min`;
    if (h < 24) return `hace ${h} h`;
    if (d === 1) return 'ayer';
    return `hace ${d} días`;
}

function fmtTime(d) {
    return d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

// Escapes for HTML attribute and content (reused for both contexts)
function esc(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ================================================================
//  INIT
// ================================================================
loadAllFeeds();
startTimer();
</script>
</body>
</html>
